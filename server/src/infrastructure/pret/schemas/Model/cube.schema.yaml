# Cube Resource Schema
# This schema defines the structure and validation rules for Cube resources
# Updated to align with CubePackageFile.cs and CubeSpec.cs models

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/Cube"
title: Cube
description: Cube definition with dimensions, properties, and configuration settings

type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
    description: API version identifier

  kind:
    type: string
    const: Cube
    description: Resource kind - specifically Cube

  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
        description: Cube display name
      description:
        type: string
        description: Cube description
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required:
      - name
      - type
      - dimensions
    properties:
      name:
        type: string
        description: "Cube name (from CubeSpec)"

      type:
        type: string
        description: "Cube type identifier"

      entitlement:
        type: string
        description: "Model entitlement settings"

      category:
        type: string
        description: "Model category classification"

      includeCurrency:
        type: boolean
        description: "Whether cube includes currency dimension"

      includeDetailedPlanning:
        type: boolean
        description: "Whether cube includes detailed planning features"

      dimensions:
        type: array
        minItems: 1
        description: "Dimensions within this cube"
        items:
          type: object
          required:
            - kind
            - name
          properties:
            kind:
              type: string
              description: "Dimension kind (e.g., AccountDimension, TimeDimension, etc.)"
            name:
              type: string
              description: "Dimension name reference"