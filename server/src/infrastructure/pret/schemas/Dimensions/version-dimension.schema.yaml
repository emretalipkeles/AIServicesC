# VersionDimension Resource Schema
# This schema defines the structure and validation rules for Version dimension resources

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/VersionDimension"
title: VersionDimension
description: Version dimension for planning, actuals, and calculated scenarios

type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
    description: API version identifier

  kind:
    type: string
    const: VersionDimension
    description: Resource kind - specifically VersionDimension

  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
        description: Dimension display name
      description:
        type: string
        description: Dimension description
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required:
      - name
      - members
    properties:
      name:
        type: string
        description: "Dimension name (from DimensionSpecBase)"
      customProperties:
        type: array
        maxItems: 200
        description: Custom member properties (ID >= 200, aligned with MemberPropertyDefinition.cs)
        items:
          type: object
          required:
            - name
            - valueType
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 40
              description: "Property name (e.g., Key, Name, Custom Field)"
            valueType:
              type: string
              enum:
                - Text
                - Integer
                - Decimal
                - Date
                - Boolean
                - MemberOfDimension
              default: "Text"
              description: "Value type"
            columnDefinition:
              type: string
              description: "Column definition type (e.g., Key, ParentKey, Name)"
            isNameColumn:
              type: boolean
              description: "Whether this property serves as the name column"
            description:
              type: string
              description: "Property description"
            level:
              type: string
              description: "Associated level name (for level-based hierarchies)"
            lookupCubeDimensionString:
              type: string
              description: "Lookup cube dimension string reference"
            defaultValue:
              type: string
              description: "Default value for this property"
            hierarchyName:
              type: string
              description: "Associated hierarchy name"
            cmpName:
              type: string
              description: "CMP (Custom Member Property) name"
            orderBy:
              type: string
              description: "Default ordering method"
            nameDefaultValue:
              type: string
              description: "Default value for name property"
            size:
              type: integer
              minimum: 1
              maximum: 3995
              description: "Property size (for text properties)"
            label:
              type: string
              maxLength: 100
              description: "Human-readable display label (for custom properties)"
            reference:
              type: string
              pattern: "^\\[[^\\]]+\\]\\.\\[[^\\]]+\\]$"
              description: "Reference for MemberOfDimension type (format: [CubeName].[DimensionName])"

      members:
        type: array
        minItems: 1
        description: Version members with version-specific properties
        items:
          type: object
          required:
            - key
            - name
          properties:
            key:
              type: string
              minLength: 1
              maxLength: 40
              pattern: "^[^'\"\\\\(){}\\[\\]@][^'\"\\\\(){}\\[\\]@]*$"
              description: Member unique key
            name:
              type: string
              minLength: 1
              maxLength: 256
              pattern: "^[^\\[\\]@]*$"
              description: Member display name
            parent:
              type: string
              maxLength: 40
              description: Parent member key for hierarchy

            # Version-specific properties (IDs 20-26)
            versionType:
              type: string
              enum:
                - Folder
                - Plan
                - Actual
                - Calculated
              description: Version type (ID 20)
            versionStatus:
              type: string
              enum:
                - Unknown
                - Active
                - Complete
              description: Version status (ID 21)
            versionRuleSet:
              type: string
              description: Rule set ID (ID 22)
            startPeriod:
              type: string
              pattern: "^\\[.+\\]\\.\\[.+\\]\\.&\\[.+\\]$|^\\[.+\\]\\.\\[.+\\]$"
              description: Start period time member reference (ID 23)
            endPeriod:
              type: string
              pattern: "^\\[.+\\]\\.\\[.+\\]\\.&\\[.+\\]$|^\\[.+\\]\\.\\[.+\\]$"
              description: End period time member reference (ID 24)
            carryForward:
              type: string
              maxLength: 40
              description: Carry forward version member key (ID 25)
            versionNote:
              type: string
              maxLength: 255
              description: Version notes (ID 26)
            calculationMethod:
              type: string
              maxLength: 2000
              description: Calculation method description (ID 27)

            # Custom properties
            customProperties:
              type: object
              description: Custom property values
              patternProperties:
                "^[a-z][a-zA-Z0-9]*$":
                  description: Custom property value

            # Calculation
            calculation:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - Input
                    - StandardFormula
                    - ProceduralCalculation
                    - LeafFormula
                    - NonLeafFormula
                    - AggregateChildren
                    - LookupCube
                    - TimeConversionFormula
                value:
                  type: string
                  description: Formula content
                language:
                  type: string
                  enum:
                    - Mdx
                    - Prophix
                  description: Formula language
                operation:
                  type: string
                  description: Operation for AggregateChildren type
                preventDataEntry:
                  type: boolean
                  default: false
                requireLineItemSchedule:
                  type: boolean
                  default: false
                ruleSetId:
                  type: string
                ruleSet:
                  type: string

      # Additional spec-level properties (from DimensionSpecBase)
      hierarchies:
        type: array
        description: "Hierarchies within this dimension (from DimensionSpecBase)"
        items:
          type: object
          required:
            - name
            - type
          properties:
            name:
              type: string
              description: "Hierarchy name (e.g., Default, Planning)"
            type:
              type: string
              enum: ["ParentChild", "Level"]
              default: "ParentChild"
              description: "Hierarchy type"
            levels:
              type: array
              description: "Levels within this hierarchy (for Level-based hierarchies)"
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: "Level name"
                  memberPropertyName:
                    type: string
                    description: "Member property name that defines this level"
            description:
              type: string
              description: "Optional hierarchy description"
            isDefault:
              type: boolean
              description: "Whether this is the default hierarchy"

      orderBy:
        type: string
        description: "Default ordering method (from DimensionSpecBase)"

      defaultMember:
        type: string
        description: "Default member for the dimension (from DimensionSpecBase)"

    additionalProperties: false
