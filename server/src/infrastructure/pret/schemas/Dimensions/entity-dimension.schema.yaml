# EntityDimension Resource Schema
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/EntityDimension"
title: EntityDimension
description: Legal entity dimension for consolidation (typically managed by external systems)

type: object
required: [apiVersion, kind, metadata, spec]

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
  kind:
    type: string
    const: EntityDimension
  metadata:
    type: object
    required: [name]
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
      description:
        type: string
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required: [members]
    properties:
      customProperties:
        type: array
        items:
          type: object
          required: [name, label, type]
          properties:
            name:
              type: string
              pattern: "^[a-z][a-zA-Z0-9]*$"
            label:
              type: string
            type:
              type: string
              enum: [Text, Integer, Decimal, Date, Boolean, MemberOfDimension]
            size:
              type: integer
              minimum: 1
              maximum: 3995
            default: {}
            reference:
              type: string
              pattern: "^\\[.+\\]\\.\\[.+\\]$"
            description:
              type: string

      members:
        type: array
        minItems: 1
        items:
          type: object
          required: [key, name]
          properties:
            key:
              type: string
              minLength: 1
              maxLength: 40
              pattern: "^[^'\"\\\\(){}\\[\\]@][^'\"\\\\(){}\\[\\]@]*$"
            name:
              type: string
              minLength: 1
              maxLength: 256
              pattern: "^[^\\[\\]@]*$"
            parent:
              type: string
              maxLength: 40

            # Common dimension properties (IDs 30-35)
            calculationMethod:
              type: string
              maxLength: 2000
              description: "Calculation method description (ID: 30)"
            memberType:
              type: integer
              minimum: 0
              maximum: 10
              description: "Member type identifier (ID: 31)"
            memberNote:
              type: string
              maxLength: 1000
              description: "Member notes and comments (ID: 32)"
            additionalProperty33:
              type: string
              maxLength: 1000
              description: "Additional property 33 for data preservation"
            additionalProperty34:
              type: string
              maxLength: 1000
              description: "Additional property 34 for data preservation"
            additionalProperty35:
              type: string
              maxLength: 1000
              description: "Additional property 35 for data preservation"

            customProperties:
              type: object
              patternProperties:
                "^[a-z][a-zA-Z0-9]*$": {}
            calculation:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [Input, StandardFormula, ProceduralCalculation, LeafFormula, NonLeafFormula, AggregateChildren, LookupCube, TimeConversionFormula]
                value:
                  type: string
                language:
                  type: string
                  enum: [Mdx, Prophix]
                operation:
                  type: string
                preventDataEntry:
                  type: boolean
                requireLineItemSchedule:
                  type: boolean
                ruleSetId:
                  type: string
                ruleSet:
                  type: string
    additionalProperties: false
