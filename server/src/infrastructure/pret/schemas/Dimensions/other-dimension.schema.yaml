# OtherDimension Resource Schema
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/OtherDimension"
title: OtherDimension
description: Generic dimension for custom business hierarchies

type: object
required: [apiVersion, kind, metadata, spec]

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
  kind:
    type: string
    const: OtherDimension
  metadata:
    type: object
    required: [name]
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
      description:
        type: string
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required:
      - name
      - members
    properties:
      name:
        type: string
        description: "Dimension name (from DimensionSpecBase)"
      customProperties:
        type: array
        maxItems: 200
        description: Custom member properties (ID >= 200, aligned with MemberPropertyDefinition.cs)
        items:
          type: object
          required:
            - name
            - valueType
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 40
              description: "Property name (e.g., Key, Name, Custom Field)"
            valueType:
              type: string
              enum:
                - Text
                - Integer
                - Decimal
                - Date
                - Boolean
                - MemberOfDimension
              default: "Text"
              description: "Value type"
            columnDefinition:
              type: string
              description: "Column definition type (e.g., Key, ParentKey, Name)"
            isNameColumn:
              type: boolean
              description: "Whether this property serves as the name column"
            description:
              type: string
              description: "Property description"
            level:
              type: string
              description: "Associated level name (for level-based hierarchies)"
            lookupCubeDimensionString:
              type: string
              description: "Lookup cube dimension string reference"
            defaultValue:
              type: string
              description: "Default value for this property"
            hierarchyName:
              type: string
              description: "Associated hierarchy name"
            cmpName:
              type: string
              description: "CMP (Custom Member Property) name"
            orderBy:
              type: string
              description: "Default ordering method"
            nameDefaultValue:
              type: string
              description: "Default value for name property"
            size:
              type: integer
              minimum: 1
              maximum: 3995
              description: "Property size (for text properties)"
            label:
              type: string
              maxLength: 100
              description: "Human-readable display label (for custom properties)"
            reference:
              type: string
              pattern: "^\\[[^\\]]+\\]\\.\\[[^\\]]+\\]$"
              description: "Reference for MemberOfDimension type (format: [CubeName].[DimensionName])"

      members:
        type: array
        minItems: 1
        items:
          type: object
          required: [key, name]
          properties:
            key:
              type: string
              minLength: 1
              maxLength: 40
              pattern: "^[^'\"\\\\(){}\\[\\]@][^'\"\\\\(){}\\[\\]@]*$"
            name:
              type: string
              minLength: 1
              maxLength: 256
              pattern: "^[^\\[\\]@]*$"
            parent:
              type: string
              maxLength: 40
            customProperties:
              type: object
              patternProperties:
                "^[a-z][a-zA-Z0-9]*$": {}
            calculation:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [Input, StandardFormula, ProceduralCalculation, LeafFormula, NonLeafFormula, AggregateChildren, LookupCube, TimeConversionFormula]
                value:
                  type: string
                language:
                  type: string
                  enum: [Mdx, Prophix]
                operation:
                  type: string
                preventDataEntry:
                  type: boolean
                requireLineItemSchedule:
                  type: boolean
                ruleSetId:
                  type: string
                ruleSet:
                  type: string

      # Additional spec-level properties (from DimensionSpecBase)
      hierarchies:
        type: array
        description: "Hierarchies within this dimension (from DimensionSpecBase)"
        items:
          type: object
          required:
            - name
            - type
          properties:
            name:
              type: string
              description: "Hierarchy name (e.g., Default, Custom)"
            type:
              type: string
              enum: ["ParentChild", "Level"]
              default: "ParentChild"
              description: "Hierarchy type"
            levels:
              type: array
              description: "Levels within this hierarchy (for Level-based hierarchies)"
              items:
                type: object
                properties:
                  name:
                    type: string
                    description: "Level name"
                  memberPropertyName:
                    type: string
                    description: "Member property name that defines this level"
            description:
              type: string
              description: "Optional hierarchy description"
            isDefault:
              type: boolean
              description: "Whether this is the default hierarchy"

      orderBy:
        type: string
        description: "Default ordering method (from DimensionSpecBase)"

      defaultMember:
        type: string
        description: "Default member for the dimension (from DimensionSpecBase)"

    additionalProperties: false
