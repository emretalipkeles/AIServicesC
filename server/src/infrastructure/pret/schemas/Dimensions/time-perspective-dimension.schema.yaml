# TimePerspectiveDimension Resource Schema
# This schema defines the structure and validation rules for TimePerspective dimension resources

$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/TimePerspectiveDimension"
title: TimePerspectiveDimension
description: Time aggregation perspective dimension for reporting (YTD, QTD, Rolling, etc.)

type: object
required:
  - apiVersion
  - kind
  - metadata
  - spec

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
    description: API version identifier

  kind:
    type: string
    const: TimePerspectiveDimension
    description: Resource kind - specifically TimePerspectiveDimension

  metadata:
    type: object
    required:
      - name
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
        description: Dimension display name
      description:
        type: string
        description: Dimension description
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required:
      - members
    properties:
      customProperties:
        type: array
        description: Custom member properties (ID >= 200)
        items:
          type: object
          required:
            - name
            - label
            - type
          properties:
            name:
              type: string
              pattern: "^[a-z][a-zA-Z0-9]*$"
              description: Property identifier (camelCase)
            label:
              type: string
              description: Property display label
            type:
              type: string
              enum:
                - Text
                - Integer
                - Decimal
                - Date
                - Boolean
                - MemberOfDimension
              description: Property value type
            size:
              type: integer
              minimum: 1
              maximum: 3995
              description: Size limit for Text type
            default:
              description: Default property value
            reference:
              type: string
              pattern: "^\\[.+\\]\\.\\[.+\\]$"
              description: Dimension reference for MemberOfDimension type
            description:
              type: string
              description: Property description

      members:
        type: array
        minItems: 1
        description: TimePerspective members with time aggregation methods
        items:
          type: object
          required:
            - key
            - name
          properties:
            key:
              type: string
              minLength: 1
              maxLength: 40
              pattern: "^[^'\"\\\\(){}\\[\\]@][^'\"\\\\(){}\\[\\]@]*$"
              description: Member unique key (BASE is reserved)
            name:
              type: string
              minLength: 1
              maxLength: 256
              pattern: "^[^\\[\\]@]*$"
              description: Member display name
            parent:
              type: string
              maxLength: 40
              description: Parent member key for hierarchy

            # TimePerspective-specific properties (IDs 30-32)
            timePerspectiveCalculationMethod:
              type: string
              enum:
                - ROLLING
                - LTD
                - YTD
                - QTD
                - HYTD
                - PTD
                - MTD
                - HMTD
                - BWTD
                - WTD
              description: Time perspective calculation method (ID 30)
            memberType:
              type: string
              enum:
                - MemberOnly
                - CalculatedMember
              description: Member type - affects calculation restrictions (ID 31)
            memberNote:
              type: string
              maxLength: 255
              description: Member notes (ID 32)

            # Custom properties
            customProperties:
              type: object
              description: Custom property values
              patternProperties:
                "^[a-z][a-zA-Z0-9]*$":
                  description: Custom property value

            # Calculation
            calculation:
              type: object
              required:
                - type
              properties:
                type:
                  type: string
                  enum:
                    - Input
                    - StandardFormula
                    - ProceduralCalculation
                    - LeafFormula
                    - NonLeafFormula
                    - AggregateChildren
                    - LookupCube
                    - TimeConversionFormula
                value:
                  type: string
                  description: Formula content
                language:
                  type: string
                  enum:
                    - Mdx
                    - Prophix
                  description: Formula language
                operation:
                  type: string
                  description: Operation for AggregateChildren type
                preventDataEntry:
                  type: boolean
                  default: false
                requireLineItemSchedule:
                  type: boolean
                  default: false
                ruleSetId:
                  type: string
                ruleSet:
                  type: string

    additionalProperties: false
