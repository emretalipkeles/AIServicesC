# ClassificationDimension Resource Schema
$schema: "https://json-schema.org/draft/2020-12/schema"
$id: "https://schemas.prophix.com/model.fpna.prophix.com/v1/ClassificationDimension"
title: ClassificationDimension
description: Classification dimension for data sources and adjustments

type: object
required: [apiVersion, kind, metadata, spec]

properties:
  apiVersion:
    type: string
    const: model.fpna.prophix.com/v1
  kind:
    type: string
    const: ClassificationDimension
  metadata:
    type: object
    required: [name]
    properties:
      name:
        type: string
        minLength: 1
        maxLength: 100
        pattern: "^[^/\\\\*|?\"()\\[\\]{}<>=+!$%&':;,`.@]*$"
      description:
        type: string
      labels:
        type: object
        patternProperties:
          "^[a-zA-Z][a-zA-Z0-9_-]*$":
            type: string
        additionalProperties: false

  spec:
    type: object
    required: [members]
    properties:
      customProperties:
        type: array
        items:
          type: object
          required: [name, label, type]
          properties:
            name:
              type: string
              pattern: "^[a-z][a-zA-Z0-9]*$"
            label:
              type: string
            type:
              type: string
              enum: [Text, Integer, Decimal, Date, Boolean, MemberOfDimension]
            size:
              type: integer
              minimum: 1
              maximum: 3995
            default: {}
            reference:
              type: string
              pattern: "^\\[.+\\]\\.\\[.+\\]$"
            description:
              type: string

      members:
        type: array
        minItems: 1
        items:
          type: object
          required: [key, name]
          properties:
            key:
              type: string
              minLength: 1
              maxLength: 40
              pattern: "^[^'\"\\\\(){}\\[\\]@][^'\"\\\\(){}\\[\\]@]*$"
            name:
              type: string
              minLength: 1
              maxLength: 256
              pattern: "^[^\\[\\]@]*$"
            parent:
              type: string
              maxLength: 40

            # Classification-specific properties (IDs 40-43)
            memberType:
              type: string
              enum: [None, Adjustment, AdjustedBalances, Source]
              description: Member classification type (ID 40)
            currencyTreatment:
              type: string
              enum: [NoConvert, Convert, ConvertPrior]
              description: Currency conversion treatment (ID 43)

            customProperties:
              type: object
              patternProperties:
                "^[a-z][a-zA-Z0-9]*$": {}

            calculation:
              type: object
              required: [type]
              properties:
                type:
                  type: string
                  enum: [Input, StandardFormula, ProceduralCalculation, LeafFormula, NonLeafFormula, AggregateChildren, LookupCube, TimeConversionFormula]
                value:
                  type: string
                language:
                  type: string
                  enum: [Mdx, Prophix]
                operation:
                  type: string
                preventDataEntry:
                  type: boolean
                  default: false
                requireLineItemSchedule:
                  type: boolean
                  default: false
                ruleSetId:
                  type: string
                ruleSet:
                  type: string

    additionalProperties: false
